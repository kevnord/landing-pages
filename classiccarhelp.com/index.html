<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>classiccarhelp.com — For Sale</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:#1a1008;
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:2rem;text-align:center;
  }
  body::before{
    content:'';position:fixed;inset:12px;
    border:1px solid #8a6020;pointer-events:none;z-index:10;
  }
  body::after{
    content:'';position:fixed;inset:15px;
    border:1px solid rgba(138,96,32,.3);pointer-events:none;z-index:10;
  }
  .road{
    position:fixed;bottom:0;left:0;right:0;height:70px;
    background:#1a1a14;border-top:2px solid #3a3020;
  }
  .road::before{
    content:'';position:absolute;top:50%;left:0;right:0;height:3px;margin-top:-1px;
    background:repeating-linear-gradient(90deg,#c8922a 0px,#c8922a 50px,transparent 50px,transparent 90px);
  }
  .road::after{
    content:'';position:absolute;top:0;left:0;right:0;height:8px;
    background:repeating-linear-gradient(90deg,#2a2a1a 0px,#2a2a1a 8px,#c8922a 8px,#c8922a 16px);
    opacity:.4;
  }
  .car{
    position:fixed;bottom:66px;
    animation:drive 9s linear infinite;
  }
  @keyframes drive{
    0%  {left:-180px}
    100%{left:calc(100% + 40px)}
  }
  .container{max-width:580px;width:100%;position:relative;z-index:1;padding-bottom:100px}
  .badge{
    display:inline-block;font-size:10px;font-weight:700;
    letter-spacing:.2em;text-transform:uppercase;
    color:#c8922a;border:1px solid #c8922a;
    padding:4px 14px;border-radius:2px;margin-bottom:1.5rem
  }
  h1{
    font-family:'Playfair Display',Georgia,serif;
    font-size:clamp(1.8rem,6vw,3.5rem);font-weight:900;
    letter-spacing:-.01em;line-height:1.05;
    color:#f0e0c0;margin-bottom:.4rem
  }
  h1 .tld{color:#c8922a;font-weight:700}
  .rule{display:flex;align-items:center;gap:1rem;justify-content:center;margin-bottom:.75rem}
  .rule::before,.rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,#8a6020)}
  .rule::after{background:linear-gradient(90deg,#8a6020,transparent)}
  .tagline{font-size:.75rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:#8a6020}
  p{font-size:.95rem;color:#7a6040;line-height:1.8;margin:1.25rem 0 2rem;font-weight:300}
  .cta{
    display:inline-block;background:#c8922a;color:#1a1008;
    font-size:.8rem;font-weight:700;padding:13px 32px;
    border-radius:2px;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;
    transition:background .2s
  }
  .cta:hover{background:#e0a830}
  footer{margin-top:2rem;font-size:.65rem;color:#2a1a08;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="road"></div>

  <!-- Classic 1957-ish car SVG -->
  <div class="car">
    <svg width="160" height="55" viewBox="0 0 160 55" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <rect x="10" y="28" width="140" height="18" rx="4" fill="#8B1A1A"/>
      <!-- Cabin -->
      <path d="M38 28 C42 14, 55 10, 75 9 L105 9 C118 9, 128 14, 132 28Z" fill="#6B1010"/>
      <!-- Windshield / windows -->
      <path d="M54 27 C56 18, 63 13, 75 12 L95 12 C104 12, 110 16, 113 27Z" fill="#1a2a3a" opacity=".8"/>
      <!-- Chrome grill -->
      <rect x="134" y="30" width="14" height="10" rx="2" fill="#c8922a"/>
      <line x1="134" y1="33" x2="148" y2="33" stroke="#1a1008" stroke-width="1"/>
      <line x1="134" y1="36" x2="148" y2="36" stroke="#1a1008" stroke-width="1"/>
      <line x1="134" y1="39" x2="148" y2="39" stroke="#1a1008" stroke-width="1"/>
      <!-- Headlight -->
      <circle cx="148" cy="31" r="4" fill="#f5e090" opacity=".9"/>
      <circle cx="148" cy="31" r="2.5" fill="#fff" opacity=".8"/>
      <!-- Tail fin left -->
      <path d="M10 28 L2 20 L14 28Z" fill="#6B1010"/>
      <!-- Tail light -->
      <rect x="10" y="29" width="6" height="8" rx="1" fill="#cc2200"/>
      <!-- Chrome side trim -->
      <line x1="15" y1="36" x2="135" y2="36" stroke="#c8922a" stroke-width="1.5" opacity=".6"/>
      <!-- Wheels -->
      <circle cx="38" cy="46" r="9" fill="#1a1008" stroke="#c8922a" stroke-width="2"/>
      <circle cx="38" cy="46" r="4.5" fill="#3a3020" stroke="#c8922a" stroke-width="1"/>
      <circle cx="38" cy="46" r="1.5" fill="#c8922a"/>
      <circle cx="118" cy="46" r="9" fill="#1a1008" stroke="#c8922a" stroke-width="2"/>
      <circle cx="118" cy="46" r="4.5" fill="#3a3020" stroke="#c8922a" stroke-width="1"/>
      <circle cx="118" cy="46" r="1.5" fill="#c8922a"/>
      <!-- Bumper -->
      <rect x="136" y="42" width="18" height="4" rx="2" fill="#c8922a"/>
      <rect x="6" y="42" width="14" height="4" rx="2" fill="#c8922a"/>
    </svg>
  </div>

  <div class="container">
    <div class="badge">For Sale</div>
    <h1>classiccarhelp<span class="tld">.com</span></h1>
    <div class="rule"><span class="tagline">Your Classic Deserves Better</span></div>
    <p>The perfect home for a classic car community, restoration guides, shop directory, or enthusiast hub. This domain is for sale — get in touch.</p>
    <a href="mailto:contact@classiccarhelp.com" class="cta">contact@classiccarhelp.com</a>
    <footer>classiccarhelp.com</footer>
  </div>
</body>
</html>
