<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>c4architect.org — For Sale</title>
<meta name="description" content="This domain is for sale. Contact us to inquire.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:#0a0a0a;color:#f0f0f0;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:2rem;
  }
  .container{max-width:560px;text-align:center}
  .badge{
    display:inline-block;font-size:11px;font-weight:600;
    letter-spacing:.15em;text-transform:uppercase;
    color:#e67e22;border:1px solid #7a3f0a;
    padding:4px 12px;border-radius:999px;margin-bottom:2rem
  }
  h1{
    font-size:clamp(1.8rem,5vw,3rem);font-weight:700;
    letter-spacing:-.03em;line-height:1.1;color:#fff;margin-bottom:1.25rem
  }
  h1 .tld{color:#444;font-weight:300}
  p{font-size:1rem;color:#777;line-height:1.7;margin-bottom:2.5rem;font-weight:300}
  .cta{
    display:inline-block;background:#fff;color:#0a0a0a;
    font-size:.875rem;font-weight:600;padding:14px 28px;
    border-radius:6px;text-decoration:none;letter-spacing:.01em
  }
  .cta:hover{background:#e5e5e5}
  footer{position:fixed;bottom:1.5rem;font-size:.7rem;color:#333;letter-spacing:.05em}
</style>
</head>
<body>
  <div class="container">
    <div class="badge">For Sale</div>
    <h1>c4architect<span class="tld">.org</span></h1>
    <p>This domain is for sale. Interested? Get in touch.</p>
    <a href="mailto:contact@c4architect.org" class="cta">contact@c4architect.org</a>
  </div>
  <footer>c4architect.org</footer>
</body>
</html>
