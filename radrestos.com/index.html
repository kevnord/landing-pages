<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>radrestos.com — For Sale</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:#0d0d1a;
    background-image:
      linear-gradient(180deg, #0d0d1a 0%, #1a0a2e 50%, #0d0d1a 100%);
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:2rem;text-align:center;
    overflow:hidden;
  }
  /* Neon grid floor */
  .grid{
    position:fixed;bottom:0;left:0;right:0;height:40vh;
    background:
      linear-gradient(transparent 0%, rgba(255,0,200,.08) 100%),
      repeating-linear-gradient(90deg, rgba(255,0,200,.15) 0px, rgba(255,0,200,.15) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg, rgba(255,0,200,.15) 0px, rgba(255,0,200,.15) 1px, transparent 1px, transparent 60px);
    transform:perspective(400px) rotateX(60deg);
    transform-origin:bottom center;
    pointer-events:none;
  }
  .container{max-width:600px;width:100%;position:relative;z-index:1}
  .badge{
    display:inline-block;font-size:11px;font-weight:700;
    letter-spacing:.15em;text-transform:uppercase;
    color:#fff;background:transparent;
    border:1px solid #ff00c8;
    box-shadow:0 0 8px #ff00c8, inset 0 0 8px rgba(255,0,200,.2);
    padding:5px 14px;border-radius:999px;margin-bottom:1.5rem;
    text-shadow:0 0 6px #ff00c8;
  }
  h1{
    font-size:clamp(2.5rem,10vw,5rem);font-weight:900;
    letter-spacing:-.02em;line-height:1;
    margin-bottom:.25rem;
    background:linear-gradient(135deg, #ff00c8 0%, #00e5ff 50%, #ff00c8 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 12px rgba(0,229,255,.5));
  }
  h1 .tld{
    font-size:.5em;font-weight:300;
    background:linear-gradient(135deg,#7700ff,#00e5ff);
    -webkit-background-clip:text;background-clip:text;
  }
  .tagline{
    font-size:1rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
    color:#00e5ff;text-shadow:0 0 10px #00e5ff;
    margin-bottom:.75rem
  }
  p{font-size:.95rem;color:#9a80b0;line-height:1.7;margin-bottom:2rem;font-weight:300}
  .cta{
    display:inline-block;
    background:transparent;
    border:2px solid #ff00c8;
    box-shadow:0 0 16px #ff00c8, inset 0 0 16px rgba(255,0,200,.1);
    color:#fff;
    font-size:.875rem;font-weight:700;padding:14px 32px;
    border-radius:6px;text-decoration:none;letter-spacing:.05em;
    text-shadow:0 0 8px #fff;
    transition:all .2s
  }
  .cta:hover{
    background:rgba(255,0,200,.15);
    box-shadow:0 0 28px #ff00c8, inset 0 0 20px rgba(255,0,200,.2);
  }
  footer{margin-top:3rem;font-size:.7rem;color:#3a2a5a;letter-spacing:.05em;position:relative;z-index:1}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="container">
    <div class="badge">For Sale</div>
    <h1>radrestos<span class="tld">.com</span></h1>
    <div class="tagline">🔥 Totally tubular restomods since '84 🔥</div>
    <p>Big hair. Big engines. Zero apologies. This domain is for sale — make an offer, dude.</p>
    <a href="mailto:contact@radrestos.com" class="cta">contact@radrestos.com</a>
    <footer>radrestos.com</footer>
  </div>
</body>
</html>
