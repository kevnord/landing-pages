<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design B — Card Center</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f4f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo-mark {
    width: 52px;
    height: 52px;
    background: #111;
    border-radius: 12px;
    margin: 0 auto 1.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.05em;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.03em;
    margin-bottom: 0.75rem;
  }
  .domain { color: #e67e22; }
  p {
    font-size: 0.95rem;
    color: #666;
    line-height: 1.65;
    margin-bottom: 2rem;
  }
  .divider {
    height: 1px;
    background: #eee;
    margin-bottom: 1.75rem;
  }
  .email-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.5rem;
  }
  .cta {
    display: block;
    background: #111;
    color: #fff;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 13px 24px;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 0.5rem;
    letter-spacing: 0.01em;
  }
  .cta:hover { background: #333; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">M</div>
    <h1><span class="domain">myrestoparts</span>.com</h1>
    <p>This domain is reserved for something great. Interested in what's coming? Drop us a line.</p>
    <div class="divider"></div>
    <div class="email-label">Get in touch</div>
    <a href="mailto:contact@myrestoparts.com" class="cta">contact@myrestoparts.com</a>
  </div>
</body>
</html>
