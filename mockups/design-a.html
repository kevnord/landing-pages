<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design A — Minimal Dark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container { max-width: 560px; text-align: center; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    border: 1px solid #333;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 2rem;
  }
  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 1.25rem;
  }
  h1 span { color: #e67e22; }
  p {
    font-size: 1.05rem;
    color: #888;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }
  .cta {
    display: inline-block;
    background: #fff;
    color: #0a0a0a;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 6px;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: background 0.2s;
  }
  .cta:hover { background: #e5e5e5; }
  footer {
    position: fixed;
    bottom: 2rem;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">Coming Soon</div>
    <h1>myrestoparts<span>.</span>com</h1>
    <p>Something worth building is on its way. We'll be in touch when it's ready.</p>
    <a href="mailto:contact@myrestoparts.com" class="cta">contact@myrestoparts.com</a>
  </div>
  <footer>myrestoparts.com</footer>
</body>
</html>
